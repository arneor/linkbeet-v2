name: Admin CI

on:
  push:
    branches: [main]
    paths:
      - "admin/**"

jobs:
  ci:
    name: Install, Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm --filter @linkbeet/admin lint

      - name: Build
        run: pnpm --filter @linkbeet/admin build

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test Coverage
        run: pnpm --filter @linkbeet/admin test:coverage
        env:
          APP_ENV: staging

      - name: E2E Tests
        run: pnpm --filter @linkbeet/admin test:e2e
        env:
          APP_ENV: staging
          NEXT_PUBLIC_APP_URL: http://localhost:3010

  smoke-test:
    name: Smoke Tests (Production)
    needs: [ci]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Smoke Test
        run: pnpm --filter @linkbeet/admin test:smoke
        env:
          APP_ENV: production
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_ADMIN_URL }}

      - name: Create Sentry Release
        if: github.ref == 'refs/heads/main'
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: linkbeet
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_ADMIN }}
        with:
          environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

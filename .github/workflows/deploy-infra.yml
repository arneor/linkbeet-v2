name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"

jobs:
  terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Format Check (ecs)
        working-directory: infra/terraform/ecs
        run: terraform fmt -check

      - name: Terraform Init (ecs)
        working-directory: infra/terraform/ecs
        run: terraform init -backend=false

      - name: Terraform Validate (ecs)
        working-directory: infra/terraform/ecs
        run: terraform validate

      - name: Terraform Format Check (rds)
        working-directory: infra/terraform/rds
        run: terraform fmt -check

      - name: Terraform Init (rds)
        working-directory: infra/terraform/rds
        run: terraform init -backend=false

      - name: Terraform Validate (rds)
        working-directory: infra/terraform/rds
        run: terraform validate

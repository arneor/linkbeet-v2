name: Analytics API CI

on:
  push:
    branches: [main, staging]
    paths:
      - "api/analytics/**"

jobs:
  ci:
    name: Install, Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm --filter @linkbeet/api-analytics lint

      - name: Build Staging
        if: github.ref == 'refs/heads/staging'
        run: pnpm --filter @linkbeet/api-analytics build:staging
        env:
          APP_ENV: staging
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REDIS_URL: ${{ secrets.REDIS_URL }}

      - name: Build Production
        if: github.ref == 'refs/heads/main'
        run: pnpm --filter @linkbeet/api-analytics build:production
        env:
          APP_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REDIS_URL: ${{ secrets.REDIS_URL }}

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test Coverage
        run: pnpm --filter @linkbeet/api-analytics test:coverage
        env:
          APP_ENV: staging
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

name: linkbeet_mobile
description: LinkBeet — Hyperlocal Community Commerce Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Routing
  go_router: ^15.1.0

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Networking
  dio: ^5.8.0

  # Data Models & Serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Functional Programming
  dartz: ^0.10.1

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1

  # Utils
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  logger: ^2.5.0
  url_launcher: ^6.3.1

  # Platform
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  injectable_generator: ^2.7.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

version: '3.8'

services:
  # PostGIS Database
  db:
    image: postgis/postgis:15-3.3
    container_name: linkbeet_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: linkbeet_v2
    ports:
      - "5432:5432"
    volumes:
      - linkbeet_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis for caching, queues, Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: linkbeet_redis
    ports:
      - "6379:6379"
    volumes:
      - linkbeet_redis_data:/data
    restart: unless-stopped

  # Meilisearch for ultra-fast full-text search
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: linkbeet_meilisearch
    environment:
      - MEILI_MASTER_KEY=masterKey
      - MEILI_ENV=development
    ports:
      - "7700:7700"
    volumes:
      - linkbeet_meili_data:/meili_data
    restart: unless-stopped

volumes:
  linkbeet_db_data:
  linkbeet_redis_data:
  linkbeet_meili_data:

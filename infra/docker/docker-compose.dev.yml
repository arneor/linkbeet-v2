version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: linkbeet_postgres_dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: linkbeet_dev
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./init-scripts/postgis.sql:/docker-entrypoint-initdb.d/postgis.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d linkbeet_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: linkbeet_redis_dev
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: linkbeet_meilisearch_dev
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: dev-meilisearch-key
      MEILI_ENV: development
    volumes:
      - meilisearch_dev_data:/meili_data

  imgproxy:
    image: darthsim/imgproxy:latest
    container_name: linkbeet_imgproxy_dev
    ports:
      - "8080:8080"
    environment:
      IMGPROXY_KEY: dev-imgproxy-key
      IMGPROXY_SALT: dev-imgproxy-salt
      IMGPROXY_DEVELOPMENT_ERRORS_MODE: "true"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: linkbeet_pgadmin_dev
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@linkbeet.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres

volumes:
  postgres_dev_data:
  redis_dev_data:
  meilisearch_dev_data:

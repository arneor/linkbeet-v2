version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: linkbeet_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: linkbeet
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgis.sql:/docker-entrypoint-initdb.d/postgis.sql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: linkbeet_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: linkbeet_meilisearch
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY}
      MEILI_ENV: production
    volumes:
      - meilisearch_data:/meili_data
    restart: always

  imgproxy:
    image: darthsim/imgproxy:latest
    container_name: linkbeet_imgproxy
    ports:
      - "8080:8080"
    environment:
      IMGPROXY_KEY: ${IMGPROXY_KEY}
      IMGPROXY_SALT: ${IMGPROXY_SALT}
    restart: always

  api:
    build:
      context: ../../api
      dockerfile: Dockerfile
    container_name: linkbeet_api
    ports:
      - "3000:3000"
    env_file:
      - ../../api/.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:

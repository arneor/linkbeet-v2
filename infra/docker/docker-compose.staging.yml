version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: linkbeet_postgres_staging
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: linkbeet_staging
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
      - ./init-scripts/postgis.sql:/docker-entrypoint-initdb.d/postgis.sql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: linkbeet_redis_staging
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_staging_data:/data
    restart: always

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: linkbeet_meilisearch_staging
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY}
      MEILI_ENV: production
    volumes:
      - meilisearch_staging_data:/meili_data
    restart: always

  imgproxy:
    image: darthsim/imgproxy:latest
    container_name: linkbeet_imgproxy_staging
    environment:
      IMGPROXY_KEY: ${IMGPROXY_KEY}
      IMGPROXY_SALT: ${IMGPROXY_SALT}
    restart: always

volumes:
  postgres_staging_data:
  redis_staging_data:
  meilisearch_staging_data:

_format_version: "3.0"
_transform: true

services:
  - name: auth-service
    url: http://localhost:3001
    routes:
      - name: auth-routes
        paths:
          - /api/v1/auth
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 60
          policy: local

  - name: profile-service
    url: http://localhost:3002
    routes:
      - name: profile-routes
        paths:
          - /api/v1/profile
          - /api/v1/profiles
        strip_path: false

  - name: search-service
    url: http://localhost:3003
    routes:
      - name: search-routes
        paths:
          - /api/v1/search
        strip_path: false

  - name: catalog-service
    url: http://localhost:3004
    routes:
      - name: catalog-routes
        paths:
          - /api/v1/catalog
        strip_path: false

  - name: booking-service
    url: http://localhost:3005
    routes:
      - name: booking-routes
        paths:
          - /api/v1/booking
          - /api/v1/bookings
        strip_path: false

  - name: payment-service
    url: http://localhost:3006
    routes:
      - name: payment-routes
        paths:
          - /api/v1/payment
          - /api/v1/payments
        strip_path: false

  - name: analytics-service
    url: http://localhost:3007
    routes:
      - name: analytics-routes
        paths:
          - /api/v1/analytics
        strip_path: false

plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:3000"
        - "http://localhost:3010"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
      credentials: true
